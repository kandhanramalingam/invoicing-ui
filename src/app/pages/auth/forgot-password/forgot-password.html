<div id="form-container" class="bg-white h-full">
    <div class="flex justify-center h-full items-center">
        <form [formGroup]="loginForm" (ngSubmit)="login()" class="flex gap-4 flex-col">
            <div class="text-center">
                <img id="app-logo" src="assets/img/saico.jpg" alt="logo" />
            </div>
            <div class="form-group">
                <label class="required">Email</label>
                <input formControlName="email" pInputText type="email">
                <app-form-error
                        [control]="email"
                        [formSubmitted]="formSubmitted"
                        [messages]="{'required': 'Email is required', 'email': 'Invalid email address'}"
                ></app-form-error>
            </div>
            <button type="submit" class="btn-primary !py-3">
                <i class="fa fa-envelope"></i>&nbsp;&nbsp;Reset Password
            </button>
            <p-breadcrumb styleClass="text-sm !p-2" [home]="home" [model]="items" />
        </form>
    </div>
</div>
