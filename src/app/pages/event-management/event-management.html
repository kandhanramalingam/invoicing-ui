<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-header label="Event Management" styleClass="mb-4">
  <app-button label="New Event" (onClick)="createNewEvent()" severity="secondary" icon="fa fa-plus"></app-button>
</app-header>

<div class="flex justify-between items-center mb-3">
  <app-search-input placeholder="Search events..." (searchChange)="onSearch($event)"></app-search-input>
</div>

<p-table [value]="events()" [loading]="loading()" size="small"
         [lazy]="true" (onLazyLoad)="onLazyLoad($event)"
         [rows]="rows()" [totalRecords]="totalRecords()" [paginator]="true"
         [rowsPerPageOptions]="[10, 20, 50]"
         [first]="first()">
  <ng-template #header>
    <tr>
      <th pSortableColumn="name">
        <div class="flex items-center gap-2">
          Name
          <p-sortIcon field="name" />
        </div>
      </th>
      <th pSortableColumn="date">
        <div class="flex items-center gap-2">
          Date
          <p-sortIcon field="date" />
        </div>
      </th>
      <th>Type</th>
      <th pSortableColumn="status">
        <div class="flex items-center gap-2">
          Status
          <p-sortIcon field="status" />
        </div>
      </th>
      <th>Description</th>
      <th>Location</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  <ng-template #body let-event>
    <tr>
      <td>{{ event.name }}</td>
      <td>{{ event.date | date: 'dd MMM yyyy' }}</td>
      <td>
        <p-tag severity="secondary" [value]="event.type"></p-tag>
      </td>
      <td>
        <p-tag [severity]="getStatusSeverity(event.status)" [value]="event.status"></p-tag>
      </td>
      <td>{{ event.description }}</td>
      <td>{{ event.location }}</td>
      <td>
        <div class="flex gap-2">
          <app-button icon="fa fa-pencil" [btnClass]="'rounded-full w-10 h-10'" [outline]="true" severity="secondary" (onClick)="editEvent(event)" tooltipPosition="left" pTooltip="Edit"></app-button>
          <app-button icon="fa fa-trash" [btnClass]="'rounded-full w-10 h-10'" [outline]="true" severity="danger" (onClick)="deleteEvent(event)" tooltipPosition="left" pTooltip="Delete"></app-button>
        </div>
      </td>
    </tr>
  </ng-template>
  <ng-template #emptymessage>
    <tr>
      <td colspan="7">
        <app-no-data message="No Events"></app-no-data>
      </td>
    </tr>
  </ng-template>
</p-table>

<p-drawer [closable]="true" [closeOnEscape]="true" appendTo="body" [header]="isEditMode() ? 'Edit Event' : 'New Event'" [style]="{ width: '80vw' }" [(visible)]="showEventForm" position="right">
  <app-event-form [data]="formData()" [isEdit]="isEditMode()" (onSubmit)="onFormSubmit($event)"></app-event-form>
</p-drawer>
