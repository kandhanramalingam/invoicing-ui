<div class="flex flex-wrap gap-1 items-center">
  @if (labels().length > 0) {
    <span class="text-sm font-semibold text-gray-500">({{labels().length}})</span>
  }
  @for (label of labels().slice(0, size()); track label) {
    <p-tag [value]="label" severity="info"></p-tag>
  } @empty {
    <span class="text-gray-400 text-xs">No Items</span>
  }
  @if (labels().length > 3) {
    <a (click)="viewAll()"
       class="text-blue-600 hover:underline cursor-pointer flex items-center ml-2">
      view more
    </a>
  }
</div>

<p-dialog [(visible)]="showDialog" [header]="header()" [modal]="true" [style]="{width: '50vw'}" [breakpoints]="{ '960px': '75vw', '641px': '100vw' }">
  <div class="flex flex-wrap gap-2">
    @for (label of labels(); track label) {
      <p-tag [value]="label" severity="info"></p-tag>
    }
  </div>
</p-dialog>
